name: Deploy to Both (VPS + Vercel)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  deploy-vps:
    name: Deploy to baselots.com
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            cd /var/www/baselots-master
            git fetch origin
            git checkout production
            git pull origin production
            npm install
            npm run build
            pm2 restart baselots-dynamic
            echo "✅ VPS deployment complete!"

  trigger-vercel:
    name: Trigger Vercel deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Vercel Deploy
        run: |
          echo "✅ Vercel auto-deploys on git push"
          echo "Push to main branch triggers Vercel automatically"
